openapi: 3.0.3
info:
  title: fastFOREX.io admin fx API
  version: 2.3.2
  description: Foreign & cryptocurrency exchange rate API
  termsOfService: https://www.fastforex.io/terms-of-sale
  contact:
    email: support@fastforex.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
- url: https://api.fastforex.io
  description: Production
- url: https://api.beta.fastforex.io
  description: Beta
security:
- api_key: []
- apiKeyHeader: []
- bearerAuth: []
- basicAuth: []
tags:
- name: fx
  description: Realtime FX trading pairs - instruments, prices and history
paths:
  /fx/pairs:
    get:
      tags:
      - fx
      description: List approx 2,300 supported FX pairs
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  ms:
                    $ref: '#/components/schemas/ResponseTime'
                  pairs:
                    type: object
                    minProperties: 2000
                    additionalProperties:
                      $ref: '#/components/schemas/AnyTradingPair'
              example:
                pairs:
                  EUR/USD:
                    base: EUR
                    quote: USD
                    alt: EURUSD
                  GBP/USD:
                    base: GBP
                    quote: USD
                    alt: GBPUSD
                  USD/GBP:
                    base: USD
                    quote: GBP
                    alt: USDGBP
                ms: 8
        '400':
          description: Bad Request
        '401':
          description: Not Authorized
        '429':
          description: Rate limit exceeded
  /fx/pairs/historical-limits:
    get:
      tags:
      - fx
      description: FX pairs earliest available historical data point for the supplied interval (P1D default)
      parameters:
      - name: interval
        in: query
        description: ISO8601 duration, such as P1D (daily). Defaults to P1D. Options are P1D, PT1H, PT1M.
        required: false
        schema:
          $ref: '#/components/schemas/Duration'
      - name: price
        in: query
        description: bid or ask. Defaults to bid.
        required: false
        schema:
          $ref: '#/components/schemas/PriceType'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  ms:
                    $ref: '#/components/schemas/ResponseTime'
                  interval:
                    $ref: '#/components/schemas/Duration'
                  price:
                    $ref: '#/components/schemas/PriceType'
                  pairs:
                    type: object
                    minProperties: 2000
                    additionalProperties:
                      $ref: '#/components/schemas/DateTimes'
              example:
                interval: P1D
                price: bid
                pairs:
                  EURUSD: 1976-01-02 00:00:00+00:00
                  GBPUSD: 1970-01-02 00:00:00+00:00
                  USDJPY: 1975-01-02 00:00:00+00:00
                ms: 12
        '400':
          description: Bad Request
        '401':
          description: Not Authorized
        '429':
          description: Rate limit exceeded
  /fx/pairs/quote-sizes:
    get:
      tags:
      - fx
      description: List of FX trading pairs with non-standard quote sizes
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  ms:
                    $ref: '#/components/schemas/ResponseTime'
                  sizes:
                    type: object
                    additionalProperties:
                      type: number
                      format: integer
              example:
                sizes:
                  IRRUSD: 100000,
                  VNDUSD: 10000,
                  LKRNZD: 1000,
                  DOPGBP: 100,
                ms: 12
        '400':
          description: Bad Request
        '401':
          description: Not Authorized
        '429':
          description: Rate limit exceeded
  /fx/currencies:
    get:
      tags:
      - fx
      description: List of supported trading pair currency symbols and descriptions
      responses:
        '200':
          description: Success
          content:
            application/json:
