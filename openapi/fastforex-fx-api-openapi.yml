        '401':
          description: Not Authorized
        '403':
          description: Forbidden
        '429':
          description: Rate limit exceeded
  /fx/ohlc/time-series:
    get:
      tags:
      - fx
      description: Fetch a set of OHLC time-series data points for a given FX trading pair and interval. Values are based on the BID price. Supports a range of datetime formats and timezone offsets. Datetime format in the response will try to match your request - unless specified explicitly.
      parameters:
      - name: pair
        in: query
        description: Trading pair, such as EURUSD
        required: true
        schema:
          $ref: '#/components/schemas/TradingPair'
      - name: start
        in: query
        description: 'Time-series start. Supported formats: YYYY-MM-DD (UTC). YYYY-MM-DD HH:MM:SS (UTC), ISO8601 with timezone offset. Timestamp in milliseconds. Supply this or end.'
        required: false
        schema:
          $ref: '#/components/schemas/DateOrDateTime'
      - name: end
        in: query
        description: 'Time-series end. Supported formats: YYYY-MM-DD (UTC). YYYY-MM-DD HH:MM:SS (UTC), ISO8601 with timezone offset. Timestamp in milliseconds. Supply this or start.'
        required: false
        schema:
          $ref: '#/components/schemas/DateOrDateTime'
      - name: dtmfmt
        in: query
        description: Desired datetime response format. Defaults to match your request. Can be [ISO] ISO8601 datetime including timezone offset, [TSP] UNIX Timestamp in milliseconds, or [UTCYMD] 'YYYY-MM-DD HH:MM:SS' (UTC).
        required: false
        schema:
          $ref: '#/components/schemas/DateTimeFormat'
      - name: interval
        in: query
        description: ISO8601 duration, such as P1D (daily). Defaults to P1D. Options are P1D, PT1H, PT1M.
        required: false
        schema:
          $ref: '#/components/schemas/Duration'
      - name: limit
        in: query
        description: Maximum number of data points to return. Default varies upon duration.
        required: false
        schema:
          type: number
          format: int32
          minimum: 1
          maximum: 100
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  pair:
                    $ref: '#/components/schemas/TradingPair'
                  interval:
                    $ref: '#/components/schemas/Duration'
                  limit:
                    type: number
                    format: int32
                  dtmfmt:
                    $ref: '#/components/schemas/DateTimeFormat'
                  start:
                    $ref: '#/components/schemas/DateTimes'
                  end:
                    $ref: '#/components/schemas/DateTimes'
                  tzOffset:
                    type: string
                    description: Timezone offset. e.g. +00:00 or -05:00
                  size:
                    $ref: '#/components/schemas/QuoteSize'
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        dtm:
                          $ref: '#/components/schemas/DateTimes'
                        o:
                          type: number
                          format: float
                        h:
                          type: number
                          format: float
                        l:
                          type: number
                          format: float
                        c:
                          type: number
                          format: float
                  ms:
                    $ref: '#/components/schemas/ResponseTime'
              example:
                pair: EURUSD
                interval: P1D
                limit: 3
                dtmfmt: ISO
                end: '2021-01-26T00:00:00Z'
                tzOffset: +00:00
                size: 1
                results:
                - dtm: '2021-01-24T00:00:00Z'
                  o: 1.2145
                  h: 1.2156
                  l: 1.2134
                  c: 1.2142
                - dtm: '2021-01-25T00:00:00Z'
                  o: 1.2142
                  h: 1.2157
                  l: 1.2139
                  c: 1.2149
                - dtm: '2021-01-26T00:00:00Z'
                  o: 1.2149
                  h: 1.2158
                  l: 1.2137
                  c: 1.2145
                ms: 8
        '400':
          description: Bad Request
        '401':
          description: Not Authorized
        '403':
          description: Forbidden
        '429':
          description: Rate limit exceeded
components:
  schemas:
    IsoDateTimeZone:
      type: string
      pattern: '[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(Z?|[+-][0-9]{2}:00)'
      description: ISO8601 Datetime with optional timezone offset YYYY-MM-DDTHH:MM:SS±HH:00
      example: '2021-01-26T15:30:00-05:00'
    PriceType:
      type: string
      description: bid or ask
      enum:
      - bid
      - ask
    DateTimes:
      description: A datetime value. If no timezone offset supplied, UTC/GMT is assumed.
      oneOf:
      - $ref: '#/components/schemas/DateTime'
      - $ref: '#/components/schemas/IsoDateTimeZone'
      - $ref: '#/components/schemas/TimestampMillis'
    DateTime:
      type: string
      pattern: '[0-9]{4}-[0-9]{2}-[0-9]{2} [0-9]{2}:[0-9]{2}:[0-9]{2}'
      description: UTC/GMT datetime YYYY-MM-DD HH:MM:SS
    DateOrDateTime:
      description: A datetime value. If no timezone offset supplied, UTC/GMT is assumed. If only a date is supplied, time is assumed to be 00:00:00 UTC.
      oneOf:
      - $ref: '#/components/schemas/Date'
      - $ref: '#/components/schemas/DateTime'
      - $ref: '#/components/schemas/IsoDateTimeZone'
      - $ref: '#/components/schemas/TimestampMillis'
    DateTimeFormat:
      description: Can be [ISO] ISO8601 datetime including timezone offset, [TSP] UNIX Timestamp in milliseconds, or [UTCYMD] 'YYYY-MM-DD HH:MM:SS' (UTC).
      type: string
      enum:
      - ISO
      - TSP
      - UTCYMD
    TradingPairList:
      type: string
      pattern: '[A-Z0-9]{3,6}/?[A-Z0-9]{3,6}(,[A-Z0-9]{3,6}/?[A-Z0-9]{3,6})*'
      description: A comma-separated list of FX trading pairs
    QuoteSize:
      type: number
      format: int32
      description: Size of the quote is units of the base currency/symbol. Usually 1.
    Date:
      type: string
      pattern: '[0-9]{4}-[0-9]{2}-[0-9]{2}'
      description: UTC/GMT date YYYY-MM-DD
    AnyTradingPair:
      type: object
      description: Defines a currency trading pair.
      properties:
        base:
          type: string
          pattern: '[A-Z0-9]{3,6}'
          description: Base currency in the pair
        quote:
          type: string
          pattern: '[A-Z0-9]{3,6}'
          description: Quote currency in the pair
        alt:
          type: string
          pattern: '[A-Z0-9]{6,8}'
          description: Alternative trading pair identifier
      example:
        base: EUR
        quote: USD
        alt: EURUSD
    TimestampMillis:
      type: number
      format: int64
      description: Milliseconds since Jan 1 1970 (unix timestamp with millisecond precision)
      example: 1739305030072
    TradingPair:
      type: string
      pattern: '[A-Z0-9]{3,6}/?[A-Z0-9]{3,6}'
      description: A single FX trading pair, with or without a slash
    ResponseTime:
      type: number
      format: int32
      description: Server response time in milliseconds
    Duration:
      type: string
      description: ISO8601 Duration. https://en.wikipedia.org/wiki/ISO_8601#Durations
  securitySchemes:
    api_key:
      type: apiKey
      name: api_key
      in: query
    apiKeyHeader:
      type: apiKey
      name: X-API-KEY
      in: header
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: api_key
    basicAuth:
      type: http
      scheme: basic
externalDocs:
  description: Find out more about fastFOREX.io
  url: https://www.fastforex.io
x-samples-languages:
- curl
- node
- ruby
- javascript
- python
- php
- go
- java
- swift
x-proxy-enabled: false
