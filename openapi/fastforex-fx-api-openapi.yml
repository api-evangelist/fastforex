  /fx/quote:
    get:
      tags:
      - fx
      description: Live bid & ask quote for 1 or more (up to 10 in a single request) FX trading pairs.
      parameters:
      - name: pairs
        in: query
        description: Up to 10 target currency pairs, comma separated in XXXYYY or XXX/YYY format
        required: true
        schema:
          $ref: '#/components/schemas/TradingPairList'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  prices:
                    type: object
                    minProperties: 1
                    additionalProperties:
                      type: object
                      properties:
                        bid:
                          type: number
                          format: float
                        ask:
                          type: number
                          format: float
                        tsp:
                          $ref: '#/components/schemas/TimestampMillis'
                        size:
                          $ref: '#/components/schemas/QuoteSize'
                  ms:
                    $ref: '#/components/schemas/ResponseTime'
                example:
                  quotes:
                    EURUSD:
                      bid: 1.2145
                      ask: 1.2146
                      tsp: 1739305030072
                      size: 1
                    GBPUSD:
                      bid: 1.4145
                      ask: 1.4146
                      tsp: 1739305029908
                      size: 1
                    IRRUSD:
                      bid: 2.3808
                      ask: 2.3816
                      tsp: 1739305029908
                      size: 100000
                  ms: 8
        '400':
          description: Bad Request
        '401':
          description: Not Authorized
        '403':
          description: Forbidden
        '429':
          description: Rate limit exceeded
  /fx/quote/time-series:
    get:
      tags:
      - fx
      description: bid/ask time-series data for a given FX trading pair and interval. Values are the closing bid/ask for the interval. Supports a range of datetime formats and timezone offsets. Datetime format in the response will try to match your request - unless specified explicitly.
      parameters:
      - name: pair
        in: query
        description: Trading pair, such as EURUSD
        required: true
        schema:
          $ref: '#/components/schemas/TradingPair'
      - name: start
        in: query
        description: 'Time-series start. Supported formats: YYYY-MM-DD (UTC). YYYY-MM-DD HH:MM:SS (UTC), ISO8601 with timezone offset. Timestamp in milliseconds. Supply this or end.'
        required: false
        schema:
          $ref: '#/components/schemas/DateOrDateTime'
      - name: end
        in: query
        description: 'Time-series end. Supported formats: YYYY-MM-DD (UTC). YYYY-MM-DD HH:MM:SS (UTC), ISO8601 with timezone offset. Timestamp in milliseconds. Supply this or start.'
        required: false
        schema:
          $ref: '#/components/schemas/DateOrDateTime'
      - name: dtmfmt
        in: query
        description: Desired datetime response format. Defaults to match your request. Can be [ISO] ISO8601 datetime including timezone offset, [TSP] UNIX Timestamp in milliseconds, or [UTCYMD] 'YYYY-MM-DD HH:MM:SS' (UTC).
        required: false
        schema:
          $ref: '#/components/schemas/DateTimeFormat'
      - name: interval
        in: query
        description: ISO8601 duration, such as P1D (daily). Defaults to P1D. Options are P1D, PT1H, PT1M.
        required: false
        schema:
          $ref: '#/components/schemas/Duration'
      - name: limit
        in: query
        description: Maximum number of data points to return. Default varies upon duration.
        required: false
        schema:
          type: number
          format: int32
          minimum: 1
          maximum: 100
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  pair:
                    $ref: '#/components/schemas/TradingPair'
                  interval:
                    $ref: '#/components/schemas/Duration'
                  limit:
                    type: number
                    format: int32
                  dtmfmt:
                    $ref: '#/components/schemas/DateTimeFormat'
                  start:
                    $ref: '#/components/schemas/DateTimes'
                  end:
                    $ref: '#/components/schemas/DateTimes'
                  tzOffset:
                    type: string
                    description: Timezone offset. e.g. +00:00 or -05:00
                  size:
                    $ref: '#/components/schemas/QuoteSize'
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        dtm:
                          $ref: '#/components/schemas/DateTimes'
                        bid:
                          type: number
                          format: float
                        ask:
                          type: number
                          format: float
                  ms:
                    $ref: '#/components/schemas/ResponseTime'
              example:
                pair: GBPUSD
                interval: PT1M
                limit: 10
                dtmfmt: ISO
                end: '2025-02-13T16:30:00Z'
                tzOffset: +00:00
                size: 1
                results:
                - dtm: '2025-02-13T16:29:00Z'
                  bid: 1.25377
                  ask: 1.25379
                - dtm: '2025-02-13T16:28:00Z'
                  bid: 1.2536
                  ask: 1.25371
                - dtm: '2025-02-13T16:27:00Z'
                  bid: 1.25359
                  ask: 1.25366
                - dtm: '2025-02-13T16:26:00Z'
                  bid: 1.25385
                  ask: 1.25396
                - dtm: '2025-02-13T16:25:00Z'
                  bid: 1.25401
                  ask: 1.25402
                - dtm: '2025-02-13T16:24:00Z'
                  bid: 1.25392
                  ask: 1.25397
                - dtm: '2025-02-13T16:23:00Z'
                  bid: 1.25374
                  ask: 1.25379
                - dtm: '2025-02-13T16:22:00Z'
                  bid: 1.2537
                  ask: 1.25387
                - dtm: '2025-02-13T16:21:00Z'
                  bid: 1.25372
                  ask: 1.25389
                ms: 16
